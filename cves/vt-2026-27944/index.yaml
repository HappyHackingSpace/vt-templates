id: vt-2026-27944

info:
  name: "Nginx UI - Unauthenticated Backup Download with Encryption Key Disclosure"
  author: omarkurt
  description: |
    Nginx UI is a web user interface for managing Nginx web servers. Versions prior to 
    2.3.3 contain a critical information disclosure vulnerability. The /api/backup endpoint 
    is accessible without authentication and discloses the AES encryption key and initialization 
    vector (IV) in the X-Backup-Security HTTP response header. This allows an unauthenticated 
    attacker to download a full system backup containing sensitive data including admin credentials, 
    session tokens, SSL private keys, and complete Nginx configurations.
  targets:
    - nginx-ui
  type: CVE
  cve: CVE-2026-27944
  cwe: CWE-306
  cvss:
    score: 9.8
    metrics: "CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H"
  affected_versions:
    - "< 2.3.3"
  fixed_version: "2.3.3"
  tags:
    - nginx-ui
    - backup
    - information-disclosure
    - unauthenticated

references:
  - https://nvd.nist.gov/vuln/detail/CVE-2026-27944
  - https://github.com/advisories/GHSA-4x88-6m79-q5g5
  - https://www.tenable.com/security/research/tra-2026-17
  - https://www.thehackerwire.com/nginx-ui-unauthenticated-backup-disclosure-cve-2026-27944/
  - https://github.com/0xJacky/nginx-ui/releases/tag/v2.3.3
  - https://vulnerabletarget.com/VT-2026-27944

poc:
  nuclei:
    - "vt-2026-27944.nuclei.yaml"

remediation:
  - "Upgrade to Nginx UI version 2.3.3 or later immediately"
  - "Implement authentication middleware on /api/backup endpoint"
  - "Do not transmit encryption keys in HTTP response headers"
  - "Use proper key management (KMS, HSM, or separate secure key storage)"

providers:
  docker-compose:
    path: "docker-compose.yaml"

post-install:
  - "http://localhost:9000"

